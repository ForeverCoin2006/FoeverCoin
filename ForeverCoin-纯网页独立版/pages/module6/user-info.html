<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>实名信息管理 - 智游文创</title>
    <link rel="stylesheet" href="../static/css/common.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f8f8f8;
            min-height: 100vh;
        }

        .container {
            min-height: 100vh;
            background-color: #f8f8f8;
        }

        .nav-bar {
            height: 100px;
            background-color: #8b0000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(139, 0, 0, 0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-bar .title {
            font-size: 34px;
            font-weight: bold;
        }

        .info-box {
            margin: 30px;
            background-color: #fff;
            border-radius: 20px;
            padding: 0 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px 0;
            border-bottom: 1px solid #f5f5f5;
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .label {
            font-size: 28px;
            color: #333;
            font-weight: 500;
            width: 160px;
        }

        .input {
            flex: 1;
            font-size: 28px;
            color: #333;
            text-align: right;
            border: none;
            outline: none;
            background: transparent;
        }

        .value {
            font-size: 28px;
            color: #333;
        }

        .edit-tip {
            font-size: 24px;
            color: #8b0000;
            margin-left: 20px;
            border: 1px solid #8b0000;
            padding: 2px 10px;
            border-radius: 6px;
            cursor: pointer;
        }

        .phone-display,
        .id-display {
            flex: 1;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            cursor: pointer;
        }

        .submit-btn {
            margin: 60px 30px;
            height: 90px;
            background-color: #8b0000;
            color: #fff;
            border-radius: 45px;
            font-size: 32px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 6px 20px rgba(139, 0, 0, 0.3);
            border: none;
            cursor: pointer;
            width: calc(100% - 60px);
        }

        .tip-box {
            margin: 40px 60px;
        }

        .tip-title {
            display: block;
            font-size: 26px;
            color: #999;
            margin-bottom: 10px;
        }

        .tip-content {
            font-size: 24px;
            color: #ccc;
            line-height: 1.6;
        }

        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 20px 40px;
            border-radius: 10px;
            font-size: 28px;
            z-index: 1000;
            display: none;
        }

        .toast.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav-bar">
            <text class="title">实名信息管理</text>
        </div>

        <div class="info-box">
            <div class="info-item">
                <text class="label">姓名</text>
                <input class="input" type="text" id="nameInput" placeholder="请输入您的真实姓名" />
            </div>
            <div class="info-item">
                <text class="label">手机号码</text>
                <div class="phone-display" id="phoneDisplay" onclick="editPhone()">
                    <text class="value" id="phoneValue">点击设置</text>
                    <text class="edit-tip" id="phoneEditTip">修改</text>
                </div>
                <input class="input" type="number" id="phoneInput" placeholder="请输入11位手机号" style="display:none;" onblur="finishEditPhone()" />
            </div>
            <div class="info-item">
                <text class="label">身份证号</text>
                <div class="id-display" id="idDisplay" onclick="editID()">
                    <text class="value" id="idValue">点击设置</text>
                    <text class="edit-tip" id="idEditTip">修改</text>
                </div>
                <input class="input" type="text" id="idInput" placeholder="请输入18位身份证号" style="display:none;" onblur="finishEditID()" />
            </div>
        </div>

        <button class="submit-btn" onclick="handleUpdate()">保存修改</button>

        <div class="tip-box">
            <text class="tip-title">温馨提示：</text>
            <text class="tip-content">实名信息将用于门票预约及文创商品购买，请确保信息真实有效。智游文创将严格保护您的隐私信息。</text>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="../static/js/common.js"></script>
    <script>
        const userInfo = {
            name: '',
            phone: '',
            idCard: ''
        };

        let isEditingPhone = false;
        let isEditingID = false;

        const userId = localStorage.getItem('userId') || 'user_test_01';

        function toast(title) {
            const toastEl = document.getElementById('toast');
            toastEl.textContent = title;
            toastEl.classList.add('show');
            setTimeout(() => {
                toastEl.classList.remove('show');
            }, 2000);
        }

        function desensitizePhone(phone) {
            if (!phone) return '';
            return phone.replace(/(\d{3})\d{4}(\d{4})/, '$1****$2');
        }

        function desensitizeID(id) {
            if (!id) return '';
            return id.replace(/(\d{4})\d{10}(\d{4})/, '$1**********$2');
        }

        function updateDisplay() {
            document.getElementById('nameInput').value = userInfo.name || '';

            const phoneValue = document.getElementById('phoneValue');
            const phoneDisplay = document.getElementById('phoneDisplay');
            const phoneInput = document.getElementById('phoneInput');
            const phoneEditTip = document.getElementById('phoneEditTip');

            if (isEditingPhone) {
                phoneDisplay.style.display = 'none';
                phoneInput.style.display = 'block';
                phoneInput.value = userInfo.phone || '';
                phoneInput.focus();
            } else {
                phoneDisplay.style.display = 'flex';
                phoneInput.style.display = 'none';
                phoneValue.textContent = desensitizePhone(userInfo.phone) || '点击设置';
            }

            const idValue = document.getElementById('idValue');
            const idDisplay = document.getElementById('idDisplay');
            const idInput = document.getElementById('idInput');
            const idEditTip = document.getElementById('idEditTip');

            if (isEditingID) {
                idDisplay.style.display = 'none';
                idInput.style.display = 'block';
                idInput.value = userInfo.idCard || '';
                idInput.focus();
            } else {
                idDisplay.style.display = 'flex';
                idInput.style.display = 'none';
                idValue.textContent = desensitizeID(userInfo.idCard) || '点击设置';
            }
        }

        function editPhone() {
            isEditingPhone = true;
            updateDisplay();
        }

        function finishEditPhone() {
            userInfo.phone = document.getElementById('phoneInput').value;
            isEditingPhone = false;
            updateDisplay();
        }

        function editID() {
            isEditingID = true;
            updateDisplay();
        }

        function finishEditID() {
            userInfo.idCard = document.getElementById('idInput').value;
            isEditingID = false;
            updateDisplay();
        }

        async function fetchUserInfo() {
            toast('加载中...');

            try {
                const res = await fetch('https://api.example.com/user-info', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        userId: userId,
                        action: 'get'
                    })
                }).then(r => r.json()).catch(() => null);

                if (res && res.code === 200) {
                    userInfo.name = res.data.name || '';
                    userInfo.phone = res.data.phone || '';
                    userInfo.idCard = res.data.idCard || '';
                }
            } catch (e) {
                toast('获取失败');
            }

            updateDisplay();
        }

        async function handleUpdate() {
            userInfo.name = document.getElementById('nameInput').value;

            if (!userInfo.name) return toast('请输入姓名');
            if (!/^1[3-9]\d{9}$/.test(userInfo.phone)) return toast('请输入正确的手机号');
            if (!/(^\d{15}$)|(^\d{18}$)|(^\d{17}(\d|X|x)$)/.test(userInfo.idCard)) return toast('请输入正确的身份证号');

            toast('保存中...');

            try {
                const res = await fetch('https://api.example.com/user-info', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        userId: userId,
                        action: 'update',
                        data: userInfo
                    })
                }).then(r => r.json()).catch(() => null);

                if (res && res.code === 200) {
                    toast('保存成功');
                    setTimeout(() => {
                        history.back();
                    }, 1500);
                } else {
                    toast(res?.msg || '保存失败');
                }
            } catch (e) {
                toast('保存失败，请稍后重试');
            }
        }

        function init() {
            fetchUserInfo();
        }

        init();
    </script>
</body>
</html>
