<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>登录 - 智游文创</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #8B0000 0%, #b22222 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            min-height: 100vh;
            background: linear-gradient(135deg, #8B0000 0%, #b22222 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            width: 100%;
        }
        .login-card {
            background: #fff;
            border-radius: 20px;
            padding: 40px 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        .logo-section {
            text-align: center;
            margin-bottom: 40px;
        }
        .logo {
            font-size: 60px;
            margin-bottom: 10px;
        }
        .title {
            font-size: 28px;
            font-weight: bold;
            color: #8B0000;
            margin-bottom: 8px;
        }
        .subtitle {
            font-size: 14px;
            color: #666;
        }
        .form-section {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .input-group {
            width: 100%;
            margin-bottom: 20px;
        }
        .input-label {
            font-size: 14px;
            color: #333;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .input-field {
            width: 100%;
            height: 48px;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 0 16px;
            font-size: 15px;
            background: #f9f9f9;
            box-sizing: border-box;
        }
        .input-placeholder {
            color: #999;
        }
        .error-message {
            color: #f44336;
            font-size: 13px;
            margin-bottom: 15px;
            text-align: center;
            padding: 8px 12px;
            background: #ffebee;
            border-radius: 6px;
            width: 100%;
            box-sizing: border-box;
            display: none;
        }
        .login-btn {
            width: 100%;
            height: 48px;
            background: linear-gradient(135deg, #8B0000, #b22222);
            color: #fff;
            border: none;
            border-radius: 24px;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        .login-btn:hover {
            background: linear-gradient(135deg, #6d0000, #991111);
        }
        .register-link {
            font-size: 14px;
            color: #8B0000;
            text-align: center;
            cursor: pointer;
            padding: 10px;
        }
        .register-link a {
            text-decoration: none;
            color: #8B0000;
            border-bottom: 1px solid #8B0000;
            padding-bottom: 2px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-section">
                <div class="logo">🏛️</div>
                <div class="title">智游文创</div>
                <div class="subtitle">故宫文旅 · 智慧体验</div>
            </div>

            <div class="form-section">
                <div class="input-group">
                    <div class="input-label">账号</div>
                    <input 
                        class="input-field" 
                        id="username" 
                        placeholder="请输入账号"
                    />
                </div>

                <div class="input-group">
                    <div class="input-label">密码</div>
                    <input 
                        class="input-field" 
                        id="password" 
                        type="password" 
                        placeholder="请输入密码"
                    />
                </div>

                <div class="error-message" id="errorMessage"></div>

                <button class="login-btn" onclick="handleLogin()">登录</button>

                <div class="register-link">
                    <a href="register.html">新人注册</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 登录处理函数
        function handleLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');

            // 验证输入
            if (!username || !password) {
                errorMessage.textContent = '请输入账号和密码';
                errorMessage.style.display = 'block';
                return;
            }

            // 获取本地存储的用户数据
            const registeredUsers = JSON.parse(localStorage.getItem('registeredUsers')) || [];
            const user = registeredUsers.find(u => u.username === username);

            // 验证用户
            if (!user) {
                errorMessage.textContent = '账号错误';
                errorMessage.style.display = 'block';
            } else if (user.password !== password) {
                errorMessage.textContent = '密码错误';
                errorMessage.style.display = 'block';
            } else {
                errorMessage.style.display = 'none';
                // 显示登录成功提示
                alert('登录成功');
                // 延迟返回上一页
                setTimeout(() => {
                    window.history.back();
                }, 1500);
            }
        }
    </script>
</body>
</html>
