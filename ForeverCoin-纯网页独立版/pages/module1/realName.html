<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>实名认证 - 智游文创</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #8B0000 0%, #b22222 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .realname-container {
            min-height: 100vh;
            background: linear-gradient(135deg, #8B0000 0%, #b22222 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            width: 100%;
        }
        .realname-card {
            background: #fff;
            border-radius: 20px;
            padding: 40px 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        .logo-section {
            text-align: center;
            margin-bottom: 40px;
        }
        .logo {
            font-size: 60px;
            margin-bottom: 10px;
        }
        .title {
            font-size: 28px;
            font-weight: bold;
            color: #8B0000;
            margin-bottom: 8px;
        }
        .subtitle {
            font-size: 14px;
            color: #666;
        }
        .form-section {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .input-group {
            width: 100%;
            margin-bottom: 20px;
        }
        .input-label {
            font-size: 14px;
            color: #333;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .input-field {
            width: 100%;
            height: 48px;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 0 16px;
            font-size: 15px;
            background: #f9f9f9;
            box-sizing: border-box;
        }
        .input-placeholder {
            color: #999;
        }
        .error-message {
            color: #f44336;
            font-size: 13px;
            margin-bottom: 15px;
            text-align: center;
            padding: 8px 12px;
            background: #ffebee;
            border-radius: 6px;
            width: 100%;
            box-sizing: border-box;
            display: none;
        }
        .submit-btn {
            width: 100%;
            height: 48px;
            background: linear-gradient(135deg, #8B0000, #b22222);
            color: #fff;
            border: none;
            border-radius: 24px;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        .submit-btn:hover {
            background: linear-gradient(135deg, #6d0000, #991111);
        }
        .back-link {
            font-size: 14px;
            color: #8B0000;
            text-align: center;
            cursor: pointer;
            padding: 10px;
        }
        .back-link a {
            text-decoration: none;
            color: #8B0000;
            border-bottom: 1px solid #8B0000;
            padding-bottom: 2px;
        }
    </style>
</head>
<body>
    <div class="realname-container">
        <div class="realname-card">
            <div class="logo-section">
                <div class="logo">🆔</div>
                <div class="title">实名认证</div>
                <div class="subtitle">完善个人信息，享受完整服务</div>
            </div>

            <div class="form-section">
                <div class="input-group">
                    <div class="input-label">真实姓名</div>
                    <input 
                        class="input-field" 
                        id="realName" 
                        placeholder="请输入真实姓名"
                    />
                </div>

                <div class="input-group">
                    <div class="input-label">身份证号</div>
                    <input 
                        class="input-field" 
                        id="idCard" 
                        placeholder="请输入身份证号"
                        maxlength="18"
                    />
                </div>

                <div class="input-group">
                    <div class="input-label">手机号码</div>
                    <input 
                        class="input-field" 
                        id="phoneNumber" 
                        placeholder="请输入手机号码"
                        maxlength="11"
                        type="number"
                    />
                </div>

                <div class="error-message" id="errorMessage"></div>

                <button class="submit-btn" onclick="handleSubmit()">提交认证</button>

                <div class="back-link">
                    <a href="javascript:history.back()">返回</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 提交认证处理函数
        function handleSubmit() {
            const realName = document.getElementById('realName').value;
            const idCard = document.getElementById('idCard').value;
            const phoneNumber = document.getElementById('phoneNumber').value;
            const errorMessage = document.getElementById('errorMessage');

            // 验证输入
            if (!realName || !idCard || !phoneNumber) {
                errorMessage.textContent = '请填写完整信息';
                errorMessage.style.display = 'block';
                return;
            }

            // 验证姓名格式
            if (realName.length < 2) {
                errorMessage.textContent = '姓名格式不正确';
                errorMessage.style.display = 'block';
                return;
            }

            // 验证身份证号格式
            const idCardReg = /(^\d{15}$)|(^\d{18}$)|(^\d{17}(\d|X|x)$)/;
            if (!idCardReg.test(idCard)) {
                errorMessage.textContent = '身份证号格式不正确';
                errorMessage.style.display = 'block';
                return;
            }

            // 验证手机号码格式
            const phoneReg = /^1[3-9]\d{9}$/;
            if (!phoneReg.test(phoneNumber)) {
                errorMessage.textContent = '手机号码格式不正确';
                errorMessage.style.display = 'block';
                return;
            }

            // 存储认证信息
            localStorage.setItem('realNameInfo', JSON.stringify({
                realName: realName,
                idCard: idCard,
                phoneNumber: phoneNumber
            }));

            // 显示认证成功提示
            errorMessage.style.display = 'none';
            alert('认证成功');

            // 返回到上一页
            setTimeout(() => {
                window.history.back();
            }, 1500);
        }
    </script>
</body>
</html>
