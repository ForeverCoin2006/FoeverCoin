<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能导览</title>
    <style>
        .page { height:100vh; display:flex; flex-direction:column; }
        .map-area { padding:12px; background:#f0f0f0; height:60vh; display:flex; align-items:center; justify-content:center; }
        .popup { position:fixed; bottom:0; left:0; right:0; background:#fff; padding:12px; border-top-left-radius:8px; border-top-right-radius:8px; box-shadow:0 -2px 8px rgba(0,0,0,0.1); }
        .title { font-weight:700; font-size:16px; display:block; margin-bottom:8px; }
        .brief { margin-top:8px; color:#333; display:block; margin-bottom:12px; }
        button { padding:8px 12px; background:#007aff; color:#fff; border-radius:4px; border:none; cursor:pointer; margin-right:8px; margin-top:8px; }
    </style>
</head>
<body>
    <div class="page">
        <div class="map-area">
            <div id="mapStatus">定位讲解已启动（网页版模拟）</div>
        </div>
        
        <div id="popup" class="popup" style="display:none;">
            <span class="title" id="spotName"></span>
            <span class="brief" id="spotBrief"></span>
            <button onclick="playAudio()">播放讲解</button>
            <button onclick="closePopup()">关闭</button>
        </div>
    </div>
    
    <script src="../../../static/js/ai.js"></script>
    <script>
        // 景点数据
        const spots = [
            { id: "spot1", name: "太和殿", lat: 39.916, lng: 116.397, audio: "", brief: "太和殿是故宫三大殿之一，是明清两代皇帝举行大典的地方。" },
            { id: "spot2", name: "午门", lat: 39.915, lng: 116.3975, audio: "", brief: "午门是故宫正门，是皇帝举行重大典礼的地方。" }
        ];
        
        let activeSpot = null;
        let lastTriggered = {};
        let locTimer = null;
        
        // 计算两点之间的距离
        function getDistance(lat1, lng1, lat2, lng2) {
            const R = 6371000;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
            return 2 * R * Math.asin(Math.sqrt(a));
        }
        
        // 使用真实的AI调用函数
        // 注意：如果API调用失败，会自动使用模拟响应作为备用
        
        // 启动定位
        function startLocate() {
            // 检查浏览器是否支持Geolocation
            if (navigator.geolocation) {
                document.getElementById('mapStatus').textContent = '正在获取位置...';
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        document.getElementById('mapStatus').textContent = '定位成功，正在检测附近景点...';
                        startLocationTimer();
                    },
                    (error) => {
                        document.getElementById('mapStatus').textContent = '定位失败，请检查位置权限';
                        alert('需要定位权限才能使用智能导览');
                    }
                );
            } else {
                document.getElementById('mapStatus').textContent = '浏览器不支持定位功能';
                // 模拟定位
                setTimeout(() => {
                    document.getElementById('mapStatus').textContent = '使用模拟位置，检测附近景点...';
                    startLocationTimer();
                }, 1000);
            }
        }
        
        // 开始定位定时器
        function startLocationTimer() {
            locTimer = setInterval(() => {
                // 模拟位置（实际项目中应使用真实定位）
                const mockLat = 39.916;
                const mockLng = 116.397;
                checkNearby(mockLat, mockLng);
            }, 10000); // 每10秒检测一次
        }
        
        // 停止定位
        function stopLocate() {
            if (locTimer) {
                clearInterval(locTimer);
            }
        }
        
        // 检查附近景点
        async function checkNearby(lat, lng) {
            for (const s of spots) {
                const d = getDistance(lat, lng, s.lat, s.lng);
                if (d < 50) {
                    const now = Date.now();
                    if (!lastTriggered[s.id] || now - lastTriggered[s.id] > 30000) {
                        lastTriggered[s.id] = now;
                        // 调用AI生成更详细讲解
                        try {
                            const reply = await callAI(`为景点 ${s.name} 生成一段 60 秒的中文讲解，语言生动，适合游客听。`);
                            s.brief = reply;
                        } catch (e) {
                            console.error(e);
                        }
                        activeSpot = s;
                        showPopup(s);
                        return;
                    }
                }
            }
            // 若无附近景点，关闭弹窗
            activeSpot = null;
            closePopup();
        }
        
        // 显示弹窗
        function showPopup(spot) {
            document.getElementById('spotName').textContent = spot.name;
            document.getElementById('spotBrief').textContent = spot.brief;
            document.getElementById('popup').style.display = 'block';
        }
        
        // 关闭弹窗
        function closePopup() {
            document.getElementById('popup').style.display = 'none';
        }
        
        // 播放讲解
        function playAudio() {
            alert('播放讲解（示例）');
        }
        
        // 页面加载时启动定位
        window.onload = function() {
            startLocate();
        };
        
        // 页面隐藏时停止定位
        window.onblur = function() {
            stopLocate();
        };
        
        // 页面显示时重新启动定位
        window.onfocus = function() {
            startLocate();
        };
    </script>
</body>
</html>
