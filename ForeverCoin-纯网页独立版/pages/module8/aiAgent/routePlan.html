<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能路线规划</title>
    <style>
        .page {
            padding: 16px;
            font-family: Arial, sans-serif;
        }
        
        .route-plan {
            background: #fff;
            border-radius: 8px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 16px;
            display: block;
        }
        
        .input-area {
            margin-bottom: 16px;
        }
        
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            margin-bottom: 10px;
            font-size: 14px;
            box-sizing: border-box;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: #007aff;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .loading {
            padding: 20px;
            text-align: center;
            color: #666;
        }
        
        .route-result {
            margin-top: 20px;
        }
        
        .result-title {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            margin-bottom: 12px;
            display: block;
        }
        
        .route-step {
            display: flex;
            margin-bottom: 10px;
            align-items: flex-start;
        }
        
        .step-number {
            width: 24px;
            height: 24px;
            background: #007aff;
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            margin-right: 10px;
            flex-shrink: 0;
        }
        
        .step-info {
            flex: 1;
            font-size: 14px;
            color: #333;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="route-plan">
            <span class="title">智能路线规划</span>
            
            <div class="input-area">
                <input type="text" id="startPoint" placeholder="起点" />
                <input type="text" id="endPoint" placeholder="终点" />
                <button id="planBtn" onclick="planRoute()">规划路线</button>
            </div>
            
            <div id="loading" class="loading" style="display:none;">
                <span>规划中...</span>
            </div>
            
            <div id="routeResult" class="route-result" style="display:none;">
                <span class="result-title">推荐路线</span>
                <div id="routeSteps"></div>
            </div>
        </div>
    </div>
    
    <script>
        let startPoint = document.getElementById('startPoint');
        let endPoint = document.getElementById('endPoint');
        let planBtn = document.getElementById('planBtn');
        let loading = document.getElementById('loading');
        let routeResult = document.getElementById('routeResult');
        let routeSteps = document.getElementById('routeSteps');
        let isLoading = false;
        
        // 模拟AI调用函数
        function callAI(prompt) {
            return new Promise((resolve) => {
                setTimeout(() => {
                    // 模拟路线规划结果
                    if (prompt.includes('故宫')) {
                        resolve('1. 从午门进入故宫\n2. 参观太和殿，预计停留30分钟\n3. 参观中和殿，预计停留15分钟\n4. 参观保和殿，预计停留20分钟\n5. 前往御花园，预计停留40分钟\n6. 从神武门离开故宫');
                    } else {
                        resolve('1. 从起点出发\n2. 沿主要道路前行\n3. 经过沿途景点\n4. 到达终点');
                    }
                }, 1500);
            });
        }
        
        async function planRoute() {
            if (!startPoint.value || !endPoint.value) {
                alert('请输入起点和终点');
                return;
            }
            
            if (isLoading) return;
            
            isLoading = true;
            planBtn.disabled = true;
            loading.style.display = 'block';
            routeResult.style.display = 'none';
            
            try {
                const prompt = `请为从 ${startPoint.value} 到 ${endPoint.value} 规划一条详细的旅游路线，包括沿途景点、预计时间和建议停留时长。`;
                const reply = await callAI(prompt);
                const route = reply.split('\n').filter(item => item.trim());
                renderRouteSteps(route);
                routeResult.style.display = 'block';
            } catch (e) {
                console.error(e);
                alert('规划失败，请重试');
            } finally {
                isLoading = false;
                planBtn.disabled = false;
                loading.style.display = 'none';
            }
        }
        
        function renderRouteSteps(route) {
            routeSteps.innerHTML = '';
            route.forEach((step, index) => {
                const stepDiv = document.createElement('div');
                stepDiv.className = 'route-step';
                stepDiv.innerHTML = `
                    <div class="step-number">${index + 1}</div>
                    <div class="step-info">${step}</div>
                `;
                routeSteps.appendChild(stepDiv);
            });
        }
    </script>
</body>
</html>
