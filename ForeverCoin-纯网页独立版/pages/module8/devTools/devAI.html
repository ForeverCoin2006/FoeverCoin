<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 开发工具</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 16px;
            background: #f5f5f5;
        }
        textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: monospace;
            font-size: 14px;
            box-sizing: border-box;
        }
        .buttons {
            display: flex;
            gap: 8px;
            margin: 8px 0;
        }
        button {
            padding: 8px 12px;
            background: #007aff;
            color: #fff;
            border-radius: 4px;
            border: none;
            cursor: pointer;
        }
        .result {
            padding: 12px;
            background: #fff;
            min-height: 120px;
            white-space: pre-wrap;
            border-radius: 4px;
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>
    <div class="page">
        <textarea id="code" placeholder="粘贴代码片段" style="height:200px;"></textarea>
        <div class="buttons">
            <button onclick="checkCode()">代码检查</button>
            <button onclick="generateAnnotations()">生成注释</button>
        </div>
        <div class="result" id="result"></div>
    </div>
    
    <script>
        let code = document.getElementById('code');
        let result = document.getElementById('result');
        
        // 模拟AI调用函数
        function callAI(prompt) {
            return new Promise((resolve) => {
                setTimeout(() => {
                    if (prompt.includes('检查')) {
                        resolve('代码检查结果：\n\n1. 未发现明显bug\n2. 建议使用更具描述性的变量名\n3. 考虑添加错误处理\n4. 代码结构清晰，逻辑合理');
                    } else if (prompt.includes('注释')) {
                        resolve('代码注释结果：\n\n// 示例函数：计算两个数的和\nfunction add(a, b) {\n    // 参数a：第一个加数\n    // 参数b：第二个加数\n    // 返回值：两数之和\n    return a + b;\n}\n\n// 调用示例\nconst result = add(1, 2);\nconsole.log(result); // 输出：3');
                    } else {
                        resolve('AI 响应：' + prompt);
                    }
                }, 1000);
            });
        }
        
        async function checkCode() {
            if (!code.value.trim()) {
                alert('请粘贴代码');
                return;
            }
            const prompt = `请检查以下 JavaScript 代码是否有 bug，并给出优化建议：\n\n${code.value}`;
            result.textContent = '检查中...';
            try {
                result.textContent = await callAI(prompt);
            } catch (e) {
                result.textContent = '检查失败';
                console.error(e);
            }
        }
        
        async function generateAnnotations() {
            if (!code.value.trim()) {
                alert('请粘贴代码');
                return;
            }
            const prompt = `请为以下 JavaScript 代码补全注释，并解释每个函数的作用：\n\n${code.value}`;
            result.textContent = '生成注释中...';
            try {
                result.textContent = await callAI(prompt);
            } catch (e) {
                result.textContent = '生成失败';
                console.error(e);
            }
        }
    </script>
</body>
</html>
