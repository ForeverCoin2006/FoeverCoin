<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智游故宫 - 门票预约</title>
    <link rel="stylesheet" href="../static/css/common.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f8f8f8;
            min-height: 100vh;
            padding-bottom: 50px;
        }

        .container {
            min-height: 100vh;
            background-color: #f8f8f8;
            padding-bottom: 50px;
        }

        .header {
            height: 300px;
            background-color: #8b0000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
        }

        .header .title {
            font-size: 48px;
            font-weight: bold;
            letter-spacing: 4px;
        }

        .header .subtitle {
            font-size: 24px;
            margin-top: 10px;
            opacity: 0.8;
        }

        .form-container {
            margin: -50px 30px 0;
            background-color: #fff;
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            position: relative;
            z-index: 1;
        }

        .form-item {
            margin-bottom: 40px;
        }

        .form-item .label {
            font-size: 30px;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
            padding-left: 10px;
            border-left: 8px solid #8b0000;
        }

        .date-scroll {
            white-space: nowrap;
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .date-item {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 30px;
            margin-right: 20px;
            border-radius: 12px;
            background-color: #f5f5f5;
            transition: all 0.3s;
            cursor: pointer;
            min-width: 80px;
        }

        .date-item.active {
            background-color: #8b0000;
            color: #fff;
        }

        .date-item .day {
            font-size: 24px;
            margin-bottom: 6px;
        }

        .date-item .date {
            font-size: 28px;
            font-weight: bold;
        }

        .radio-group {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .radio-item {
            flex: 1;
            min-width: 180px;
            height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f5f5f5;
            border-radius: 12px;
            font-size: 28px;
            color: #666;
            transition: all 0.3s;
            cursor: pointer;
        }

        .radio-item.active {
            background-color: #8b0000;
            color: #fff;
        }

        .submit-btn {
            margin-top: 60px;
            height: 90px;
            background-color: #8b0000;
            color: #fff;
            border-radius: 45px;
            font-size: 32px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 6px 20px rgba(139, 0, 0, 0.3);
            border: none;
            cursor: pointer;
            width: 100%;
        }

        .submit-btn:active {
            opacity: 0.9;
        }

        .footer-link {
            text-align: center;
            margin-top: 40px;
            font-size: 28px;
            color: #8b0000;
            text-decoration: underline;
            cursor: pointer;
        }

        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 20px 40px;
            border-radius: 10px;
            font-size: 28px;
            z-index: 1000;
            display: none;
        }

        .toast.show {
            display: block;
        }

        .modal-mask {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 999;
            display: none;
        }

        .modal-mask.show {
            display: block;
        }

        .popup-content {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: #fff;
            border-top-left-radius: 30px;
            border-top-right-radius: 30px;
            padding: 30px;
            z-index: 1000;
            max-height: 80vh;
            overflow-y: auto;
        }

        .popup-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .popup-title {
            font-size: 32px;
            font-weight: bold;
            color: #333;
        }

        .close-btn {
            font-size: 60px;
            color: #999;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <text class="title">智游故宫</text>
            <text class="subtitle">门票预约</text>
        </div>

        <div class="form-container">
            <div class="form-item">
                <div class="label">选择日期</div>
                <div class="date-scroll" id="dateScroll"></div>
            </div>

            <div class="form-item">
                <div class="label">选择时段</div>
                <div class="radio-group" id="timeSlotGroup"></div>
            </div>

            <div class="form-item">
                <div class="label">选择票种</div>
                <div class="radio-group" id="ticketTypeGroup"></div>
            </div>

            <button class="submit-btn" onclick="handleSubmit()">立即预约</button>
        </div>

        <div class="footer-link" onclick="goToList()">
            <text>查看我的预约订单 ></text>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="../static/js/common.js"></script>
    <script>
        const formData = {
            date: '',
            time: '',
            ticketType: ''
        };

        const dateList = [];
        const timeSlots = ['上午', '下午'];
        const ticketTypes = ['成人', '学生', '儿童'];

        function initDateList() {
            const weeks = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            for (let i = 0; i < 7; i++) {
                const date = new Date();
                date.setDate(date.getDate() + i);
                const month = (date.getMonth() + 1).toString().padStart(2, '0');
                const day = date.getDate().toString().padStart(2, '0');
                const weekDay = weeks[date.getDay()];
                dateList.push({
                    label: `${month}-${day}`,
                    day: weekDay,
                    value: `${date.getFullYear()}-${month}-${day}`
                });
            }
            renderDateList();
        }

        function renderDateList() {
            const container = document.getElementById('dateScroll');
            container.innerHTML = '';
            dateList.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'date-item' + (formData.date === item.value ? ' active' : '');
                div.innerHTML = `<text class="day">${item.day}</text><text class="date">${item.label}</text>`;
                div.onclick = () => selectDate(item.value);
                container.appendChild(div);
            });
        }

        function selectDate(value) {
            formData.date = value;
            renderDateList();
        }

        function initTimeSlots() {
            const container = document.getElementById('timeSlotGroup');
            container.innerHTML = '';
            timeSlots.forEach(item => {
                const div = document.createElement('div');
                div.className = 'radio-item' + (formData.time === item ? ' active' : '');
                div.innerHTML = `<text>${item}</text>`;
                div.onclick = () => selectTime(item);
                container.appendChild(div);
            });
        }

        function selectTime(value) {
            formData.time = value;
            initTimeSlots();
        }

        function initTicketTypes() {
            const container = document.getElementById('ticketTypeGroup');
            container.innerHTML = '';
            ticketTypes.forEach(item => {
                const div = document.createElement('div');
                div.className = 'radio-item' + (formData.ticketType === item ? ' active' : '');
                div.innerHTML = `<text>${item}</text>`;
                div.onclick = () => selectTicketType(item);
                container.appendChild(div);
            });
        }

        function selectTicketType(value) {
            formData.ticketType = value;
            initTicketTypes();
        }

        function toast(title) {
            const toastEl = document.getElementById('toast');
            toastEl.textContent = title;
            toastEl.classList.add('show');
            setTimeout(() => {
                toastEl.classList.remove('show');
            }, 2000);
        }

        function showLoading(title) {
            toast(title || '加载中...');
        }

        function hideLoading() {
        }

        async function handleSubmit() {
            if (!formData.date) return toast('请选择日期');
            if (!formData.time) return toast('请选择时段');
            if (!formData.ticketType) return toast('请选择票种');

            showLoading('预约中...');

            const userId = localStorage.getItem('userId') || 'user_test_01';

            try {
                const res = await fetch('https://api.example.com/reserve-create', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        userId: userId,
                        ...formData
                    })
                }).then(r => r.json()).catch(() => null);

                hideLoading();

                if (res && res.code === 200) {
                    if (confirm('预约成功\n您的门票已预约成功')) {
                        goToList();
                    }
                } else {
                    toast(res?.msg || '预约失败，请稍后重试');
                }
            } catch (e) {
                hideLoading();
                toast('网络异常，请稍后重试');
            }
        }

        function goToList() {
            window.location.href = 'reserve-list.html';
        }

        function init() {
            initDateList();
            initTimeSlots();
            initTicketTypes();

            if (dateList.length > 0) {
                formData.date = dateList[0].value;
                renderDateList();
            }

            let userId = localStorage.getItem('userId');
            if (!userId) {
                userId = 'user_test_01';
                localStorage.setItem('userId', userId);
            }
        }

        init();
    </script>
</body>
</html>
