<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的预约单</title>
    <link rel="stylesheet" href="../static/css/common.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f5f5f5;
            min-height: 100vh;
        }

        .container {
            min-height: 100vh;
            background-color: #f5f5f5;
            display: flex;
            flex-direction: column;
        }

        .nav-bar {
            height: 100px;
            background-color: #8b0000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(139, 0, 0, 0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        /* 新增返回首页按钮样式 */
        .back-home-btn {
            position: absolute;
            left: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .back-home-btn:hover {
            background-color: rgba(255, 255, 255, 0.3);
        }

        .back-home-btn a {
            color: #fff;
            text-decoration: none;
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-bar .title {
            font-size: 34px;
            font-weight: bold;
        }

        .list-scroll {
            flex: 1;
            padding: 20px;
        }

        .reserve-card {
            background-color: #fff;
            border-radius: 16px;
            margin-bottom: 24px;
            padding: 30px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.03);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
            margin-bottom: 20px;
        }

        .card-header .id {
            font-size: 24px;
            color: #999;
        }

        .card-header .status {
            font-size: 26px;
            font-weight: bold;
        }

        .status-normal { color: #52c41a; }
        .status-refunded { color: #999; }
        .status-changed { color: #1890ff; }

        .card-body {
            margin-bottom: 20px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
        }

        .info-row .label {
            font-size: 26px;
            color: #666;
        }

        .info-row .value {
            font-size: 26px;
            color: #333;
        }

        .card-footer {
            display: flex;
            justify-content: flex-end;
            gap: 20px;
            padding-top: 20px;
            border-top: 1px solid #f5f5f5;
        }

        .btn {
            height: 60px;
            line-height: 60px;
            font-size: 26px;
            border-radius: 30px;
            padding: 0 40px;
            border: none;
            cursor: pointer;
        }

        .change-btn {
            background-color: #fff;
            color: #8b0000;
            border: 2px solid #8b0000;
        }

        .refund-btn {
            background-color: #fff;
            color: #999;
            border: 2px solid #ddd;
        }

        .load-status {
            text-align: center;
            padding: 30px;
            font-size: 24px;
            color: #999;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 200px;
        }

        .empty-img {
            width: 200px;
            height: 200px;
            opacity: 0.2;
            margin-bottom: 30px;
        }

        .empty-text {
            font-size: 28px;
            color: #999;
            margin-bottom: 50px;
        }

        .go-reserve-btn {
            width: 300px;
            height: 80px;
            background-color: #8b0000;
            color: #fff;
            border-radius: 40px;
            font-size: 28px;
            border: none;
            cursor: pointer;
        }

        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 20px 40px;
            border-radius: 10px;
            font-size: 28px;
            z-index: 1000;
            display: none;
        }

        .toast.show {
            display: block;
        }

        .modal-mask {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 999;
            display: none;
        }

        .modal-mask.show {
            display: block;
        }

        .popup-content {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: #fff;
            border-top-left-radius: 30px;
            border-top-right-radius: 30px;
            padding: 30px;
            z-index: 1000;
            max-height: 80vh;
            overflow-y: auto;
        }

        .popup-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .popup-title {
            font-size: 32px;
            font-weight: bold;
            color: #333;
        }

        .close-btn {
            font-size: 60px;
            color: #999;
            cursor: pointer;
        }

        .reschedule-form .section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 28px;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
            display: block;
        }

        .date-scroll {
            white-space: nowrap;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 10px;
        }

        .date-item {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 30px;
            margin-right: 20px;
            border-radius: 12px;
            background-color: #f5f5f5;
            cursor: pointer;
            min-width: 80px;
        }

        .date-item.active {
            background-color: #8b0000;
            color: #fff;
        }

        .time-group {
            display: flex;
            gap: 20px;
        }

        .time-item {
            flex: 1;
            height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f5f5f5;
            border-radius: 12px;
            font-size: 28px;
            color: #666;
            cursor: pointer;
        }

        .time-item.active {
            background-color: #8b0000;
            color: #fff;
        }

        .confirm-btn {
            width: 100%;
            height: 90px;
            background-color: #8b0000;
            color: #fff;
            border-radius: 45px;
            font-size: 32px;
            border: none;
            cursor: pointer;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav-bar">
            <!-- 新增返回首页按钮 -->
            <div class="back-home-btn">
                <a href="../module7/智游文创.html">
                    <span>⬅️</span>
                    <span>返回首页</span>
                </a>
            </div>
            <text class="title">我的预约单</text>
        </div>

        <div class="list-scroll" id="listScroll">
            <div id="reserveListContainer"></div>
            <div class="load-status" id="loadStatus"></div>
        </div>

        <div class="empty-state" id="emptyState" style="display:none;">
            <img class="empty-img" src="../static/images/logo.png" alt="empty">
            <text class="empty-text">您还没有任何预约记录</text>
            <button class="go-reserve-btn" onclick="goToReserve()">立即预约</button>
        </div>
    </div>

    <div class="modal-mask" id="rescheduleModal">
        <div class="popup-content">
            <div class="popup-header">
                <text class="popup-title">修改预约时间</text>
                <text class="close-btn" onclick="closeReschedule()">×</text>
            </div>
            <div class="reschedule-form">
                <div class="section">
                    <text class="section-title">新日期</text>
                    <div class="date-scroll" id="rescheduleDateScroll"></div>
                </div>
                <div class="section">
                    <text class="section-title">新时段</text>
                    <div class="time-group" id="rescheduleTimeGroup"></div>
                </div>
                <button class="confirm-btn" onclick="handleReschedule()">确认改期</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="../static/js/common.js"></script>
    <script>
        const reserveList = [];
        let page = 1;
        const pageSize = 10;
        let hasMore = true;
        let isRefreshing = false;

        const showRescheduleModal = false;
        let rescheduleId = '';
        const rescheduleData = {
            date: '',
            time: ''
        };
        const futureDates = [];

        function initFutureDates() {
            const list = [];
            for (let i = 0; i < 7; i++) {
                const date = new Date();
                date.setDate(date.getDate() + i);
                const month = (date.getMonth() + 1).toString().padStart(2, '0');
                const day = date.getDate().toString().padStart(2, '0');
                list.push({
                    label: `${month}-${day}`,
                    value: `${date.getFullYear()}-${month}-${day}`
                });
            }
            futureDates.length = 0;
            futureDates.push(...list);
        }

        function toast(title) {
            const toastEl = document.getElementById('toast');
            toastEl.textContent = title;
            toastEl.classList.add('show');
            setTimeout(() => {
                toastEl.classList.remove('show');
            }, 2000);
        }

        function getStatusClass(status) {
            switch(status) {
                case '正常': return 'status-normal';
                case '已退票': return 'status-refunded';
                case '已改期': return 'status-changed';
                default: return '';
            }
        }

        function getDayOfWeek(dateStr) {
            const weeks = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            const date = new Date(dateStr);
            return weeks[date.getDay()];
        }

        function renderReserveList() {
            const container = document.getElementById('reserveListContainer');
            const emptyState = document.getElementById('emptyState');
            const loadStatus = document.getElementById('loadStatus');

            if (reserveList.length === 0) {
                container.innerHTML = '';
                emptyState.style.display = 'flex';
                loadStatus.style.display = 'none';
                return;
            }

            emptyState.style.display = 'none';
            container.innerHTML = reserveList.map((item, index) => `
                <div class="reserve-card">
                    <div class="card-header">
                        <text class="id">预约单号：${item._id ? item._id.substring(0, 8) : 'N/A'}...</text>
                        <text class="status ${getStatusClass(item.status)}">${item.status}</text>
                    </div>
                    <div class="card-body">
                        <div class="info-row">
                            <text class="label">预约日期</text>
                            <text class="value">${item.date || ''} (${getDayOfWeek(item.date || '')})</text>
                        </div>
                        <div class="info-row">
                            <text class="label">预约时段</text>
                            <text class="value">${item.time || ''}</text>
                        </div>
                        <div class="info-row">
                            <text class="label">票种类型</text>
                            <text class="value">${item.ticketType || ''}票</text>
                        </div>
                    </div>
                    ${item.status === '正常' ? `
                    <div class="card-footer">
                        <button class="btn change-btn" onclick="openReschedule(${index})">改期</button>
                        <button class="btn refund-btn" onclick="handleRefund('${item._id || ''}')">退票</button>
                    </div>
                    ` : ''}
                </div>
            `).join('');

            loadStatus.style.display = 'block';
            loadStatus.textContent = hasMore ? '正在加载更多...' : '没有更多预约记录了';
        }

        async function fetchList(isReset = false) {
            if (isReset) {
                page = 1;
                reserveList.length = 0;
                hasMore = true;
            }

            const userId = localStorage.getItem('userId') || 'user_test_01';

            try {
                const res = await fetch('https://api.example.com/reserve-list', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        userId: userId,
                        page: page,
                        pageSize: pageSize
                    })
                }).then(r => r.json()).catch(() => null);

                if (res && res.code === 200) {
                    const data = res.data || [];
                    if (data.length < pageSize) {
                        hasMore = false;
                    }
                    reserveList.push(...data);
                }
            } catch (e) {
                toast('列表获取失败');
            }

            isRefreshing = false;
            renderReserveList();
        }

        function onRefresh() {
            isRefreshing = true;
            fetchList(true);
        }

        function onLoadMore() {
            if (hasMore) {
                page++;
                fetchList();
            }
        }

        function handleRefund(id) {
            if (!confirm('确认退票\n退票后将无法恢复，是否继续？')) {
                return;
            }

            toast('处理中...');

            const userId = localStorage.getItem('userId') || 'user_test_01';

            fetch('https://api.example.com/reserve-refund', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    reserveId: id,
                    userId: userId
                })
            }).then(r => r.json()).then(res => {
                if (res && res.code === 200) {
                    toast('退票成功');
                    fetchList(true);
                } else {
                    toast(res?.msg || '退票失败');
                }
            }).catch(() => {
                toast('网络异常');
            });
        }

        function openReschedule(index) {
            const item = reserveList[index];
            if (!item) return;

            rescheduleId = item._id || '';
            rescheduleData.date = item.date || '';
            rescheduleData.time = item.time || '';

            renderRescheduleModal();
            document.getElementById('rescheduleModal').classList.add('show');
        }

        function closeReschedule() {
            document.getElementById('rescheduleModal').classList.remove('show');
        }

        function renderRescheduleModal() {
            const dateScroll = document.getElementById('rescheduleDateScroll');
            dateScroll.innerHTML = futureDates.map(item => `
                <div class="date-item ${rescheduleData.date === item.value ? 'active' : ''}" onclick="selectRescheduleDate('${item.value}')">
                    <text class="label">${item.label}</text>
                </div>
            `).join('');

            const timeGroup = document.getElementById('rescheduleTimeGroup');
            timeGroup.innerHTML = ['上午', '下午'].map(item => `
                <div class="time-item ${rescheduleData.time === item ? 'active' : ''}" onclick="selectRescheduleTime('${item}')">
                    <text>${item}</text>
                </div>
            `).join('');
        }

        function selectRescheduleDate(value) {
            rescheduleData.date = value;
            renderRescheduleModal();
        }

        function selectRescheduleTime(value) {
            rescheduleData.time = value;
            renderRescheduleModal();
        }

        async function handleReschedule() {
            toast('正在提交...');

            const userId = localStorage.getItem('userId') || 'user_test_01';

            try {
                const res = await fetch('https://api.example.com/reserve-change', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        reserveId: rescheduleId,
                        userId: userId,
                        newDate: rescheduleData.date,
                        newTime: rescheduleData.time
                    })
                }).then(r => r.json()).catch(() => null);

                if (res && res.code === 200) {
                    toast('改期成功');
                    closeReschedule();
                    fetchList(true);
                } else {
                    toast(res?.msg || '改期失败');
                }
            } catch (e) {
                toast('改期失败');
            }
        }

        function goToReserve() {
            window.location.href = 'reserve.html';
        }

        function init() {
            initFutureDates();
            fetchList();
        }

        init();

        const listScroll = document.getElementById('listScroll');
        let touchStartY = 0;
        let touchEndY = 0;

        listScroll.addEventListener('touchstart', (e) => {
            touchStartY = e.touches[0].clientY;
        });

        listScroll.addEventListener('touchend', (e) => {
            touchEndY = e.changedTouches[0].clientY;
            if (touchStartY - touchEndY > 50) {
                onRefresh();
            }
            if (touchEndY - touchStartY > 50) {
                const scrollTop = listScroll.scrollTop;
                const scrollHeight = listScroll.scrollHeight;
                const clientHeight = listScroll.clientHeight;
                if (scrollTop + clientHeight >= scrollHeight - 50) {
                    onLoadMore();
                }
            }
        });
    </script>
</body>
</html>
