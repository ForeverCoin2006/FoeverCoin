<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>文创商城 - 智游文创</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            background: #f5f7fa;
            padding-bottom: 50px;
        }
        .shop-container {
            padding: 10px;
            padding-bottom: 60px;
        }
        .search-bar {
            display: flex;
            margin-bottom: 15px;
        }
        .search-bar input {
            flex: 1;
            height: 40px;
            border: 1px solid #e0e0e0;
            border-radius: 4px 0 0 4px;
            padding: 0 10px;
            font-size: 14px;
        }
        .search-btn {
            width: 60px;
            height: 40px;
            line-height: 40px;
            background-color: #007aff;
            color: white;
            border: none;
            border-radius: 0 4px 4px 0;
            font-size: 14px;
            padding: 0;
            cursor: pointer;
        }
        .category-tabs {
            display: flex;
            border-bottom: 1px solid #e0e0e0;
            margin-bottom: 15px;
            overflow-x: auto;
        }
        .tab-item {
            flex: 1;
            text-align: center;
            padding: 10px 0;
            font-size: 14px;
            color: #666;
            white-space: nowrap;
            cursor: pointer;
        }
        .tab-item.active {
            color: #007aff;
            border-bottom: 2px solid #007aff;
        }
        .goods-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        .goods-item {
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            padding: 10px;
            background: #fff;
            cursor: pointer;
        }
        .goods-image {
            width: 100%;
            height: 100px;
            background-color: #f5f5f5;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .image-placeholder {
            font-size: 12px;
            color: #999;
            text-align: center;
            padding: 10px;
        }
        .goods-info {
            display: flex;
            flex-direction: column;
        }
        .goods-name {
            font-size: 14px;
            color: #333;
            margin-bottom: 5px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .goods-price {
            font-size: 16px;
            color: #ff6b6b;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .goods-stock {
            font-size: 12px;
            color: #999;
        }
        .empty {
            grid-column: 1 / -1;
            text-align: center;
            padding: 50px 0;
            color: #999;
            font-size: 14px;
        }
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 50px;
            background-color: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: space-around;
        }
        .bar-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            height: 50px;
            cursor: pointer;
        }
        .bar-item.active {
            color: #007aff;
        }
        .bar-icon {
            font-size: 18px;
            margin-bottom: 4px;
        }
        .bar-text {
            font-size: 10px;
        }
        .placeholder {
            color: #999;
        }
    </style>
</head>
<body>
    <div class="shop-container">
        <div class="search-bar">
            <input 
                type="text" 
                id="keyword" 
                placeholder="搜索商品"
            />
            <button class="search-btn" onclick="search">搜索</button>
        </div>
        
        <div class="category-tabs">
            <div class="tab-item active" onclick="switchCategory('all')">
                全部
            </div>
            <div class="tab-item" onclick="switchCategory('cultural')">
                文化创意
            </div>
            <div class="tab-item" onclick="switchCategory('handcraft')">
                手工艺品
            </div>
            <div class="tab-item" onclick="switchCategory('digital')">
                数字文创
            </div>
        </div>

        <div class="goods-list" id="goodsList">
            <!-- 商品列表将通过JS动态生成 -->
        </div>

        <div class="bottom-bar">
            <!-- 新增首页跳转功能（跳转到智游文创） -->
            <div class="bar-item"><a href="../module7/智游文创.html" style="color: inherit; text-decoration: none; cursor: pointer;"><div class="bar-icon">🏠</div><div class="bar-text">首页</div></a></div>
            <div class="bar-item active" onclick="goToShop">
                <div class="bar-icon">🛍️</div>
                <div class="bar-text">商城</div>
            </div>
            <!-- 新增订单跳转功能 -->
            <div class="bar-item">
                <a href="./orders.html" style="color: inherit; text-decoration: none; cursor: pointer;">
                    <div class="bar-icon">📋</div>
                    <div class="bar-text">订单</div>
                </a>
            </div>
        </div>
    </div>

    <script>
        // 全局变量
        let keyword = '';
        let activeCategory = 'all';
        let goodsList = [];

        // 模拟商品数据
        const mockGoods = [
            { _id: '1', name: '文创书签套装', price: 29.9, stock: 100, category: 'cultural', image: '../../static/images/书签.png' },
            { _id: '2', name: '手工陶瓷杯', price: 89.9, stock: 50, category: 'handcraft', image: '../../static/images/陶瓷杯.png' },
            { _id: '3', name: '数字艺术NFT', price: 199.9, stock: 20, category: 'digital', image: '../../static/images/数字NFT.png' },
            { _id: '4', name: '文化T恤', price: 59.9, stock: 80, category: 'cultural', image: '../../static/images/T恤.png' },
            { _id: '5', name: '手工编织包', price: 129.9, stock: 30, category: 'handcraft', image: '../../static/images/包.png' },
            { _id: '6', name: '数字明信片', price: 19.9, stock: 150, category: 'digital', image: '../../static/images/明信片.png' }
        ];

        // 初始化页面
        function init() {
            // 检查URL参数，自动切换到指定分类
            const urlParams = new URLSearchParams(window.location.search);
            const category = urlParams.get('category');
            if (category) {
                switchCategory(category);
            }
            getGoodsList();
        }

        // 获取商品列表
        function getGoodsList() {
            // 模拟网络请求
            setTimeout(() => {
                // 根据分类和关键词过滤商品
                goodsList = mockGoods.filter(item => {
                    const categoryMatch = activeCategory === 'all' || item.category === activeCategory;
                    const keywordMatch = keyword === '' || item.name.toLowerCase().includes(keyword.toLowerCase());
                    return categoryMatch && keywordMatch;
                });
                renderGoodsList();
            }, 500);
        }

        // 渲染商品列表
        function renderGoodsList() {
            const goodsListElement = document.getElementById('goodsList');
            
            if (goodsList.length === 0) {
                goodsListElement.innerHTML = '<div class="empty">暂无商品</div>';
                return;
            }
            
            goodsListElement.innerHTML = '';
            
            goodsList.forEach(goods => {
                const goodsItem = document.createElement('div');
                goodsItem.className = 'goods-item';
                goodsItem.onclick = () => goToDetail(goods._id);
                
                goodsItem.innerHTML = `
                    <div class="goods-image">
                        <img src="${goods.image}" alt="${goods.name}" style="width: 100%; height: 100%; object-fit: cover;">
                    </div>
                    <div class="goods-info">
                        <div class="goods-name">${goods.name}</div>
                        <div class="goods-price">¥${goods.price}</div>
                        <div class="goods-stock">库存: ${goods.stock}</div>
                    </div>
                `;
                
                goodsListElement.appendChild(goodsItem);
            });
        }

        // 搜索商品
        function search() {
            keyword = document.getElementById('keyword').value;
            getGoodsList();
        }

        // 切换分类
        function switchCategory(category) {
            activeCategory = category;
            
            // 更新标签状态
            const tabItems = document.querySelectorAll('.tab-item');
            tabItems.forEach(tab => {
                if (tab.onclick.toString().includes(`switchCategory('${category}')`)) {
                    tab.classList.add('active');
                } else {
                    tab.classList.remove('active');
                }
            });
            
            getGoodsList();
        }

        // 跳转到商品详情
        function goToDetail(goodsId) {
            window.location.href = `detail.html?id=${goodsId}`;
        }

        // 跳转到首页
        function goToHome() {
            window.location.href = '../../index.html';
        }

        // 跳转到商城（已在商城页）
        function goToShop() {
            // 已在商城页
        }

        // 跳转到订单页
        function goToOrders() {
            window.location.href = 'orders.html';
        }

        // 页面加载完成后初始化
        window.onload = init;
    </script>
</body>
</html>
