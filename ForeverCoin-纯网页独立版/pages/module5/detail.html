<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>商品详情 - 智游文创</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            background: #f5f7fa;
            padding-bottom: 60px;
        }
        .detail-container {
            padding: 10px;
            padding-bottom: 60px;
        }
        .goods-image {
            width: 100%;
            height: 200px;
            background-color: #f5f5f5;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .image-placeholder {
            font-size: 16px;
            color: #999;
            text-align: center;
            padding: 20px;
        }
        .goods-info {
            margin-bottom: 15px;
        }
        .goods-name {
            font-size: 16px;
            color: #333;
            margin-bottom: 10px;
            line-height: 1.4;
        }
        .goods-price {
            font-size: 20px;
            color: #ff6b6b;
            font-weight: bold;
            margin-bottom: 7.5px;
        }
        .goods-stock {
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
        }
        .goods-category {
            font-size: 14px;
            color: #666;
        }
        .goods-desc {
            margin-bottom: 15px;
        }
        .desc-title {
            font-size: 16px;
            color: #333;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .desc-content {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
        }
        .buy-section {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 50px;
            background-color: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            padding: 0 10px;
        }
        .quantity-control {
            display: flex;
            align-items: center;
            margin-right: 15px;
        }
        .quantity-btn {
            width: 30px;
            height: 30px;
            line-height: 30px;
            border: 1px solid #e0e0e0;
            background-color: white;
            font-size: 16px;
            padding: 0;
            cursor: pointer;
        }
        .quantity-btn:disabled {
            color: #ccc;
            cursor: not-allowed;
        }
        .quantity {
            width: 40px;
            text-align: center;
            font-size: 14px;
            border-top: 1px solid #e0e0e0;
            border-bottom: 1px solid #e0e0e0;
            height: 30px;
            line-height: 30px;
        }
        .buy-buttons {
            flex: 1;
            display: flex;
            gap: 10px;
        }
        .add-cart-btn {
            flex: 1;
            height: 40px;
            line-height: 40px;
            background-color: #f5f5f5;
            color: #333;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            padding: 0;
            cursor: pointer;
        }
        .buy-now-btn {
            flex: 1;
            height: 40px;
            line-height: 40px;
            background-color: #ff6b6b;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            padding: 0;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="detail-container">
        <div class="goods-image">
            <div class="image-placeholder" id="goodsImage">商品图片</div>
        </div>
        
        <div class="goods-info">
            <div class="goods-name" id="goodsName">商品名称</div>
            <div class="goods-price" id="goodsPrice">¥0.00</div>
            <div class="goods-stock" id="goodsStock">库存: 0</div>
            <div class="goods-category" id="goodsCategory">分类: 未知</div>
        </div>

        <div class="goods-desc">
            <div class="desc-title">商品描述</div>
            <div class="desc-content" id="goodsDescription">暂无描述</div>
        </div>

        <div class="buy-section">
            <div class="quantity-control">
                <button class="quantity-btn" onclick="decreaseQuantity()" id="decreaseBtn">-</button>
                <div class="quantity" id="quantity">1</div>
                <button class="quantity-btn" onclick="increaseQuantity()" id="increaseBtn">+</button>
            </div>
            
            <div class="buy-buttons">
                <button class="add-cart-btn" onclick="addToCart()">加入购物车</button>
                <button class="buy-now-btn" onclick="buyNow()">立即购买</button>
            </div>
        </div>
    </div>

    <script>
        // 全局变量
        let goodsId = '';
        let goods = {
            name: '',
            price: 0,
            stock: 0,
            category: '',
            description: ''
        };
        let quantity = 1;

        // 模拟商品数据
        const mockGoods = {
            '1': {
                name: '文创书签套装',
                price: 29.9,
                stock: 100,
                category: 'cultural',
                image: '../../static/images/书签.png',
                description: '精美的文创书签套装，包含5个不同设计的书签，采用优质纸张制作，适合赠送给朋友或自用。'
            },
            '2': {
                name: '手工陶瓷杯',
                price: 89.9,
                stock: 50,
                category: 'handcraft',
                image: '../../static/images/陶瓷杯.png',
                description: '纯手工制作的陶瓷杯，每个杯子都是独一无二的，采用传统工艺，图案精美，手感舒适。'
            },
            '3': {
                name: '数字艺术NFT',
                price: 199.9,
                stock: 20,
                category: 'digital',
                image: '../../static/images/数字NFT.png',
                description: '限量版数字艺术NFT，包含独特的数字艺术品和专属权益，支持区块链验证，永久收藏。'
            },
            '4': {
                name: '文化T恤',
                price: 59.9,
                stock: 80,
                category: 'cultural',
                image: '../../static/images/T恤.png',
                description: '印有传统文化元素的T恤，采用优质纯棉面料，穿着舒适，图案精美，适合日常穿着。'
            },
            '5': {
                name: '手工编织包',
                price: 129.9,
                stock: 30,
                category: 'handcraft',
                image: '../../static/images/包.png',
                description: '手工编织的时尚包包，采用天然材料，工艺精湛，设计独特，既美观又实用。'
            },
            '6': {
                name: '数字明信片',
                price: 19.9,
                stock: 150,
                category: 'digital',
                image: '../../static/images/明信片.png',
                description: '数字明信片套装，包含10张不同设计的电子明信片，可通过邮件或社交媒体分享，环保又时尚。'
            }
        };

        // 分类映射
        const categoryMap = {
            'cultural': '文化创意',
            'handcraft': '手工艺品',
            'digital': '数字文创'
        };

        // 初始化页面
        function init() {
            // 从URL获取商品ID
            const urlParams = new URLSearchParams(window.location.search);
            goodsId = urlParams.get('id');
            if (goodsId) {
                getGoodsDetail();
            } else {
                alert('商品ID不存在');
            }
        }

        // 获取商品详情
        function getGoodsDetail() {
            // 模拟网络请求
            setTimeout(() => {
                if (mockGoods[goodsId]) {
                    goods = mockGoods[goodsId];
                    renderGoodsDetail();
                } else {
                    alert('商品不存在');
                }
            }, 500);
        }

        // 渲染商品详情
        function renderGoodsDetail() {
            const goodsImageElement = document.getElementById('goodsImage');
            goodsImageElement.innerHTML = `<img src="${goods.image}" alt="${goods.name}" style="width: 100%; height: 100%; object-fit: cover;">`;
            document.getElementById('goodsName').textContent = goods.name;
            document.getElementById('goodsPrice').textContent = `¥${goods.price}`;
            document.getElementById('goodsStock').textContent = `库存: ${goods.stock}`;
            document.getElementById('goodsCategory').textContent = `分类: ${categoryMap[goods.category] || goods.category}`;
            document.getElementById('goodsDescription').textContent = goods.description;
        }

        // 增加数量
        function increaseQuantity() {
            if (quantity < goods.stock) {
                quantity++;
                document.getElementById('quantity').textContent = quantity;
                updateButtons();
            }
        }

        // 减少数量
        function decreaseQuantity() {
            if (quantity > 1) {
                quantity--;
                document.getElementById('quantity').textContent = quantity;
                updateButtons();
            }
        }

        // 更新按钮状态
        function updateButtons() {
            const decreaseBtn = document.getElementById('decreaseBtn');
            const increaseBtn = document.getElementById('increaseBtn');
            
            decreaseBtn.disabled = quantity <= 1;
            increaseBtn.disabled = quantity >= goods.stock;
        }

        // 加入购物车
        function addToCart() {
            alert('已加入购物车');
        }

        // 立即购买
        function buyNow() {
            window.location.href = `confirm.html?goodsId=${goodsId}&quantity=${quantity}`;
        }

        // 页面加载完成后初始化
        window.onload = init;
    </script>
</body>
</html>
