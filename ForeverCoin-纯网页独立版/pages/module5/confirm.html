<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>订单确认 - 智游文创</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            background: #f5f7fa;
            padding-bottom: 60px;
        }
        .confirm-container {
            padding: 10px;
            padding-bottom: 60px;
        }
        .address-section {
            margin-bottom: 15px;
        }
        .address-title {
            font-size: 16px;
            color: #333;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .address-info {
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }
        .address-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }
        .address-name {
            font-size: 14px;
            color: #333;
            font-weight: bold;
        }
        .address-phone {
            font-size: 14px;
            color: #666;
        }
        .address-detail {
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
            line-height: 1.4;
        }
        .address-arrow {
            align-self: flex-end;
            font-size: 14px;
            color: #999;
        }
        .goods-section {
            margin-bottom: 15px;
        }
        .section-title {
            font-size: 16px;
            color: #333;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .goods-item {
            display: flex;
            align-items: center;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            padding: 10px;
        }
        .goods-image {
            width: 60px;
            height: 60px;
            background-color: #f5f5f5;
            margin-right: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .image-placeholder {
            font-size: 10px;
            color: #999;
            text-align: center;
            padding: 5px;
        }
        .goods-info {
            flex: 1;
        }
        .goods-name {
            font-size: 14px;
            color: #333;
            margin-bottom: 5px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .goods-price {
            font-size: 14px;
            color: #ff6b6b;
            font-weight: bold;
        }
        .goods-quantity {
            font-size: 14px;
            color: #666;
        }
        .price-section {
            margin-bottom: 15px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            padding: 10px;
        }
        .price-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 7.5px;
            font-size: 14px;
        }
        .price-item.total {
            margin-top: 7.5px;
            padding-top: 7.5px;
            border-top: 1px solid #e0e0e0;
            font-weight: bold;
        }
        .price-label {
            color: #666;
        }
        .price-value {
            color: #333;
        }
        .total-price {
            color: #ff6b6b;
            font-size: 16px;
        }
        .remark-section {
            margin-bottom: 15px;
        }
        .remark-title {
            font-size: 16px;
            color: #333;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .remark-section input {
            width: 100%;
            height: 50px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            padding: 10px;
            font-size: 14px;
            resize: none;
        }
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 50px;
            background-color: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            padding: 0 10px;
        }
        .total-section {
            flex: 1;
            display: flex;
            align-items: center;
        }
        .total-label {
            font-size: 14px;
            color: #666;
        }
        .submit-btn {
            width: 100px;
            height: 40px;
            line-height: 40px;
            background-color: #ff6b6b;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            padding: 0;
            cursor: pointer;
        }
        .placeholder {
            color: #999;
        }
    </style>
</head>
<body>
    <div class="confirm-container">
        <div class="address-section">
            <div class="address-title">收货地址</div>
            <div class="address-info" onclick="chooseAddress">
                <div class="address-item">
                    <div class="address-name" id="addressName">请选择收货地址</div>
                    <div class="address-phone" id="addressPhone"></div>
                </div>
                <div class="address-detail" id="addressDetail"></div>
                <div class="address-arrow">→</div>
            </div>
        </div>

        <div class="goods-section">
            <div class="section-title">商品信息</div>
            <div class="goods-item">
                <div class="goods-image">
                    <div class="image-placeholder" id="goodsImage">商品图片</div>
                </div>
                <div class="goods-info">
                    <div class="goods-name" id="goodsName">商品名称</div>
                    <div class="goods-price" id="goodsPrice">¥0.00</div>
                </div>
                <div class="goods-quantity" id="goodsQuantity">x1</div>
            </div>
        </div>

        <div class="price-section">
            <div class="price-item">
                <div class="price-label">商品金额</div>
                <div class="price-value" id="goodsAmount">¥0.00</div>
            </div>
            <div class="price-item">
                <div class="price-label">运费</div>
                <div class="price-value" id="shippingFee">¥0.00</div>
            </div>
            <div class="price-item total">
                <div class="price-label">合计</div>
                <div class="price-value total-price" id="totalPrice">¥0.00</div>
            </div>
        </div>

        <div class="remark-section">
            <div class="remark-title">订单备注</div>
            <input 
                type="text" 
                id="remark" 
                placeholder="请输入备注信息"
            />
        </div>

        <div class="bottom-bar">
            <div class="total-section">
                <div class="total-label">合计：</div>
                <div class="total-price" id="bottomTotalPrice">¥0.00</div>
            </div>
            <button class="submit-btn" onclick="submitOrder">提交订单</button>
        </div>
    </div>

    <script>
        // 全局变量
        let goodsId = '';
        let quantity = 1;
        let goods = {
            name: '',
            price: 0
        };
        let address = {
            name: '',
            phone: '',
            detail: ''
        };
        let shippingFee = 0;
        let remark = '';
        let totalPrice = 0;

        // 模拟商品数据
        const mockGoods = {
            '1': {
                name: '文创书签套装',
                price: 29.9
            },
            '2': {
                name: '手工陶瓷杯',
                price: 89.9
            },
            '3': {
                name: '数字艺术NFT',
                price: 199.9
            },
            '4': {
                name: '文化T恤',
                price: 59.9
            },
            '5': {
                name: '手工编织包',
                price: 129.9
            },
            '6': {
                name: '数字明信片',
                price: 19.9
            }
        };

        // 初始化页面
        function init() {
            // 从URL获取参数
            const urlParams = new URLSearchParams(window.location.search);
            goodsId = urlParams.get('goodsId');
            quantity = parseInt(urlParams.get('quantity')) || 1;
            if (goodsId) {
                getGoodsDetail();
            } else {
                alert('商品ID不存在');
            }
        }

        // 获取商品详情
        function getGoodsDetail() {
            // 模拟网络请求
            setTimeout(() => {
                if (mockGoods[goodsId]) {
                    goods = mockGoods[goodsId];
                    renderGoodsDetail();
                    calculateTotal();
                } else {
                    alert('商品不存在');
                }
            }, 500);
        }

        // 渲染商品详情
        function renderGoodsDetail() {
            document.getElementById('goodsImage').textContent = goods.name;
            document.getElementById('goodsName').textContent = goods.name;
            document.getElementById('goodsPrice').textContent = `¥${goods.price}`;
            document.getElementById('goodsQuantity').textContent = `x${quantity}`;
        }

        // 计算总价
        function calculateTotal() {
            const goodsAmount = goods.price * quantity;
            totalPrice = goodsAmount + shippingFee;
            
            document.getElementById('goodsAmount').textContent = `¥${goodsAmount.toFixed(2)}`;
            document.getElementById('shippingFee').textContent = `¥${shippingFee.toFixed(2)}`;
            document.getElementById('totalPrice').textContent = `¥${totalPrice.toFixed(2)}`;
            document.getElementById('bottomTotalPrice').textContent = `¥${totalPrice.toFixed(2)}`;
        }

        // 选择收货地址
        function chooseAddress() {
            // 模拟选择地址
            address = {
                name: '张三',
                phone: '13800138000',
                detail: '北京市朝阳区文化园区A区1号'
            };
            
            document.getElementById('addressName').textContent = address.name;
            document.getElementById('addressPhone').textContent = address.phone;
            document.getElementById('addressDetail').textContent = address.detail;
            
            alert('地址已选择');
        }

        // 提交订单
        function submitOrder() {
            if (!address.name) {
                alert('请选择收货地址');
                return;
            }

            const token = localStorage.getItem('token');
            if (!token) {
                alert('请先登录');
                return;
            }

            // 模拟提交订单
            setTimeout(() => {
                alert('订单创建成功');
                setTimeout(() => {
                    window.location.href = 'orders.html';
                }, 1500);
            }, 1000);
        }

        // 页面加载完成后初始化
        window.onload = init;
    </script>
</body>
</html>
